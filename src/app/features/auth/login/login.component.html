<div class="login-root">
  <!-- ── Left brand panel ─────────────────────────────────────────────────── -->
  <aside class="brand-panel">
    <div class="brand-grid" aria-hidden="true"></div>

    <div class="brand-accent">
      <span class="brand-line"></span>
      <span class="brand-label">Order Management System</span>
    </div>

    <div class="brand-center">
      <img src="assets/adt-logo-transparent.png" alt="Air Distribution Technologies" class="brand-logo" />
    </div>

    <div class="brand-mountains" aria-hidden="true">
      <div class="mountain mountain-2"></div>
      <div class="mountain mountain-1"></div>
    </div>

    
  </aside>

  <!-- ── Right form panel ─────────────────────────────────────────────────── -->
  <main class="form-panel">


    <div class="particle particle-1" aria-hidden="true"></div>
    <div class="particle particle-2" aria-hidden="true"></div>
    <div class="particle particle-3" aria-hidden="true"></div>

    <div class="form-container">
      <!-- <div class="logo-wrap">
        <div class="logo-glow" aria-hidden="true"></div>
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <path d="M4 9L14 15L4 21Z" fill="rgba(45,155,136,0.7)"/>
            <path d="M14 9L24 15L14 21Z" fill="#2d9b88"/>
          </svg>
        </div>
      </div> -->

      <div class="form-header">
        <h2 class="form-title">Welcome back...</h2>
        <p class="form-sub">Sign in to your account to continue.</p>
      </div>

      <div class="form-body">
        @if (error()) {
          <div class="login-error" role="alert">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="10" stroke="#dc2626" stroke-width="1.5" />
              <path
                d="M12 8v4M12 16h.01"
                stroke="#dc2626"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            {{ error() }}
          </div>
        }

        <form class="login-form" (submit)="submit($event)" novalidate>
          <div class="field">
            <label for="username">Username</label>
            <div class="input-wrap">
              <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5" />
                <path
                  d="M4 20c0-4 3.6-7 8-7s8 3 8 7"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
              <input
                id="username"
                type="text"
                autocomplete="username"
                placeholder="domain\username"
                [value]="username()"
                (input)="username.set(inputVal($event))"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
                <rect
                  x="5"
                  y="11"
                  width="14"
                  height="10"
                  rx="2"
                  stroke="currentColor"
                  stroke-width="1.5"
                />
                <path
                  d="M8 11V7a4 4 0 018 0v4"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
              <input
                id="password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                [value]="password()"
                (input)="password.set(inputVal($event))"
                required
              />
            </div>
          </div>

          <button class="login-btn" type="submit" [disabled]="loading()">
            @if (loading()) {
              Signing in…
            } @else {
              Sign in
              <svg
                class="btn-arrow"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path
                  d="M5 12h14M13 6l6 6-6 6"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            }
          </button>
            
        </form>
      </div>

      <p class="brand-copyright">
        © 2026 Order Management System · v{{ envappVersion }}
      </p>
    </div>
  </main>

  @if (loading()) {
    <div class="app-loading-overlay app-loading-overlay--fixed">
      <div class="app-loader">
        <div class="app-dots"><span class="app-dot"></span><span class="app-dot"></span><span class="app-dot"></span></div>
        <span class="app-loader__title">Please wait while we set things up for you...</span>
        <span class="app-loader__sub">This might take a few seconds</span>
      </div>
    </div>
  }
</div>
