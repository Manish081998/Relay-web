<div class="edi-page">

  <div class="edi-header">
    <h1 class="edi-title">Edge Orders</h1>
    <p class="edi-subtitle">View or edit an order by entering the Rep PO Number.</p>
    <hr class="edi-divider" />
  </div>

  <div class="edi-panel">
    <div class="form-field">
      <label class="form-label" for="poInput">Rep PO Number</label>
      <input
        pInputText
        id="poInput"
        class="form-input"
        [class.input-error]="validationMsg()"
        placeholder="Please Enter PO"
        [ngModel]="poNumber()"
        (ngModelChange)="poNumber.set($event); validationMsg.set('')"
        autocomplete="off"
      />
      @if (validationMsg()) {
        <span class="validation-msg">{{ validationMsg() }}</span>
      } @else {
        <span class="form-hint">Enter the Rep PO Number and click OK to view/edit the order.</span>
      }
    </div>

    <div class="form-actions">
      <button type="button" class="btn-ok" [disabled]="loading()" (click)="onOk()">
        {{ loading() ? 'Loading…' : 'OK' }}
      </button>
    </div>
  </div>

</div>
