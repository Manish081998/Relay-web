<div class="mu-page">

  <!-- Page header -->
  <div class="mu-title-row">
    <div class="mu-title-left">
      <h1 class="mu-title">Manage Users</h1>
      <p class="mu-subtitle">View and manage all registered system users</p>
    </div>
    @if (!loading() && users().length > 0) {
      <span class="mu-count-badge">{{ users().length }} users</span>
    }
  </div>

  <!-- Results Grid -->
  <div class="mu-grid-wrap">
    <app-prime-table
      [columns]="columns"
      [rows]="users()"
      dataKey="userId"
      [loading]="loading()"
      pageReport="Showing {first} to {last} of {totalRecords} users"
    >
      <ng-template ptCellDef="firstName" let-user>
        <span class="cell-name">{{ $any(user).firstName }} {{ $any(user).lastName }}</span>
      </ng-template>

      <ng-template ptCellDef="isActive" let-user>
        <span class="status-chip" [attr.data-status]="$any(user).isActive ? 'active' : 'inactive'">
          {{ $any(user).isActive ? 'Active' : 'Inactive' }}
        </span>
      </ng-template>

      <ng-template ptCellDef="createdDate" let-user>
        {{ $any(user).createdDate | date:'MM/dd/yy hh:mm a' }}
      </ng-template>

      <ng-template ptCellDef="actions" let-user>
        <button class="action-btn" title="Edit user" (click)="openEdit($any(user))">
          <i class="pi pi-pencil"></i>
        </button>
      </ng-template>
    </app-prime-table>
  </div>

</div>

<!-- Edit User Dialog -->
<app-edit-user-dialog
  [visible]="editVisible()"
  (visibleChange)="editVisible.set($event)"
  [user]="editingUser()"
  [saving]="saving()"
  [brands]="brands()"
  (saved)="onSave($event)"
/>
