<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [header]="title()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [style]="{ width: '92vw', 'max-width': '1600px' }"
  [contentStyle]="{ padding: '0', overflow: 'hidden', height: 'calc(88vh - 130px)' }"
  styleClass="annot-modal"
  maskStyleClass="annot-modal-mask"
  (onHide)="close()"
>
  @if (visible()) {
    <annot-viewer
      #viewer
      [fileUrl]="mode() === 'view' ? fileUrl() : null"
      [author]="author()"
      (annotationsChange)="onAnnotationsChange($event)"
      (saveComplete)="onSaveComplete()"
      style="width: 100%; height: 100%"
    ></annot-viewer>
  }

  <ng-template pTemplate="footer">
    <div class="modal-footer">
      <button
        pButton
        icon="pi pi-times"
        label="Close"
        class="p-button-text"
        (click)="close()"
      ></button>

      @if (mode() === 'upload') {
        <button
          pButton
          icon="pi pi-cloud-upload"
          label="Final Upload"
          class="premium-btn"
          (click)="triggerUpload()"
        ></button>
      }
    </div>
  </ng-template>
</p-dialog>
