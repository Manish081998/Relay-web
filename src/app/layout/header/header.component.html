<div class="header-wrapper">
  <header class="header" role="banner">
    <div class="header-left">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        @for (crumb of breadcrumbTrail(); track $index; let last = $last) {
          @if (last) {
            <span class="breadcrumb__current">{{ crumb }}</span>
          } @else {
            <span class="breadcrumb__root">{{ crumb }}</span>
            <svg class="breadcrumb__sep" width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <path d="M9 5l7 7-7 7"/>
            </svg>
          }
        }
      </nav>
    </div>
    @if (envText) {
      <div class="env-banner" role="alert" aria-live="polite">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
          />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        <span>{{ envText }} </span>
      </div>
    }
    <div class="header-right">
      <!-- User identity pill with account dropdown -->
      @if (user(); as u) {
        <div class="user-menu"
             [class.is-open]="dropdownOpen()"
             role="navigation"
             aria-label="User account"
             (mouseenter)="dropdownOpen.set(true)"
             (mouseleave)="dropdownOpen.set(false)">
          <button class="user-pill" tabindex="0" role="button" aria-haspopup="true" aria-label="Account menu" type="button">
            <div class="user-avatar">{{ u.displayName | initials }}</div>
            <div class="user-info">
              <span class="user-name">{{ u.displayName }}</span>
              <span class="user-role">{{ u.roles[0] }}</span>
            </div>
            <svg class="user-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          <div class="user-dropdown" role="menu">
            <div class="user-dropdown__header">
              <div class="user-dropdown__avatar">{{ u.displayName | initials }}</div>
              <div class="user-dropdown__meta">
                <span class="user-dropdown__name">{{ u.displayName }}</span>
                <span class="user-dropdown__email">{{ u.email }}</span>
                <span class="user-dropdown__role-badge">{{ u.roles[0] }}</span>
              </div>
            </div>
            <div class="user-dropdown__sep" role="separator"></div>
            <a class="user-dropdown__item" routerLink="/profile" role="menuitem"
               (click)="dropdownOpen.set(false)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              My Profile
            </a>
            <div class="user-dropdown__sep" role="separator"></div>
            <button class="user-dropdown__signout" role="menuitem"
                    (click)="auth.logout(); dropdownOpen.set(false)" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
              </svg>
              Sign Out
            </button>
          </div>
        </div>
      }
    </div>
  </header>
</div>
