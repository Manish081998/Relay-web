<div class="header-wrapper">
  <header class="header" role="banner">
    <div class="header-left">
      <div class="header-title-group">
        <span class="header-accent-bar" aria-hidden="true"></span>
        <div class="header-title-stack">
          <h1 class="header-section">{{ sectionTitle() }}</h1>
          @if (envappVersion) {
            <div class="version-chip" aria-label="App version">
              <span class="version-chip__dot" aria-hidden="true"></span>
              <span>v-{{ envappVersion }}</span>
              @if (envappVersionDate) {
                <span class="version-chip__sep" aria-hidden="true">·</span>
                <span>{{ envappVersionDate }}</span>
              }
            </div>
          }
        </div>
      </div>
    </div>
    @if (envText) {
      <div class="env-banner" role="alert" aria-live="polite">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
          />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        <span>{{ envText }} </span>
      </div>
    }
    <div class="header-right">
      <!-- User identity pill -->
      @if (user(); as u) {
        <div class="user-pill">
          <div class="user-avatar">{{ u.displayName | initials }}</div>
          <div class="user-info">
            <span class="user-name">{{ u.displayName }}</span>
            <span class="user-role">{{ u.roles[0] }}</span>
          </div>
        </div>
      }
      <!-- Logout -->
      <button
        class="icon-btn icon-btn--danger"
        (click)="auth.logout()"
        aria-label="Log out"
        type="button"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
        </svg>
      </button>
    </div>
  </header>
</div>
