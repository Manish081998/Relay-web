name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [development, main]

jobs:
  # Validates every PR into main and every push — gates deployment: the deploy
  # backend only lists workflow runs whose conclusion is "success" as
  # deployable CI builds (see /api/projects/:id/ci-builds in server.js).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm test -- --watch=false --browsers=ChromeHeadless

  # Builds the exact per-environment bundle the dashboard's IIS deploy step
  # downloads and ships — "build once, deploy same artifact": nothing rebuilds
  # this output again on the way to UAT or production.
  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [uat, production]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build (${{ matrix.environment }})
        run: npx ng build --configuration ${{ matrix.environment }}
      - name: Resolve build output
        id: resolve
        run: |
          OUT=dist/relay-web
          # SSR/prerendering builds emit index.csr.html instead of index.html —
          # IIS with no Node SSR host needs index.html as the default document.
          if [ ! -f "$OUT/index.html" ] && [ -f "$OUT/index.csr.html" ]; then
            cp "$OUT/index.csr.html" "$OUT/index.html"
          fi
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
      - name: Write build metadata
        run: |
          cat > "${{ steps.resolve.outputs.out }}/ci-meta.json" <<EOF
          {
            "sha": "${{ github.sha }}",
            "shortSha": "$(echo ${{ github.sha }} | cut -c1-7)",
            "branch": "${{ github.ref_name }}",
            "runNumber": "${{ github.run_number }}",
            "runId": "${{ github.run_id }}",
            "environment": "${{ matrix.environment }}"
          }
          EOF
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.environment }}
          path: ${{ steps.resolve.outputs.out }}
          retention-days: 90
